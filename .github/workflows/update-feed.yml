name: Update phishing feed

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest phishing feed (last 30 days)
        run: |
          mkdir -p feeds
          curl -fsSL "https://urlscans.com/api/feed/export?days=30" -o feeds/urlscan-phishing-30d.txt
          date -u "+%Y-%m-%d %H:%M:%S UTC" > feeds/LAST_UPDATED.txt
          echo "Fetched $(wc -l < feeds/urlscan-phishing-30d.txt) URLs."

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feeds/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update phishing feed ($(date -u '+%Y-%m-%d'))"
            git push
          fi
